<section class="about-prod">
  <div class="about-prod__header">
    <h2 data-aos="custom-fade-up">Как мы работаем на&nbsp;объекте</h2>
    <p data-aos="custom-fade-up">
      Контроль ключевых этапов под руководством главного инженера: от&nbsp;прокладки кабеля
      и&nbsp;сборки щитов до&nbsp;пусконаладки и&nbsp;передачи документации заказчику.
    </p>
  </div>
  <div class="about-prod__container main-container">
    <div class="about-prod__slider swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <picture>
            <source srcset="./img/montazh.webp" type="image/webp" />
            <img src="./img/montazh.png" alt="Электромонтажные работы" loading="lazy" />
          </picture>
        </div>
        <div class="swiper-slide">
          <picture>
            <source srcset="./img/schit.webp" type="image/webp" />
            <img src="./img/schit.png" alt="Монтаж электрощита" loading="lazy" />
          </picture>
        </div>
        <div class="swiper-slide">
          <picture>
            <source srcset="./img/team.webp" type="image/webp" />
            <img src="./img/team.png" alt="Команда инженеров на объекте" loading="lazy" />
          </picture>
        </div>
        <div class="swiper-slide">
          <picture>
            <source srcset="./img/dogovor.webp" type="image/webp" />
            <img src="./img/dogovor.png" alt="Сдача объекта с документацией" loading="lazy" />
          </picture>
        </div>
      </div>
    </div>
    <div class="about-prod__slider-control prod-control">
      <button type="button"
        class="btn-reset slider-control__btn slider-control__btn--dark slider-control__btn--prev prod-control__btn prod-control__btn--prev"
        aria-label="Предыдущий слайд">
        <svg class="" width="24" height="24">
          <use xlink:href="img/sprite.svg#arr-right"></use>
        </svg>
      </button>
      <button type="button"
        class="btn-reset slider-control__btn slider-control__btn--dark slider-control__btn--next prod-control__btn prod-control__btn--next"
        aria-label="Следующий слайд">
        <svg class="" width="24" height="24">
          <use xlink:href="img/sprite.svg#arr-right"></use>
        </svg>
      </button>
    </div>
  </div>
</section>
